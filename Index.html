<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TechnOvalle - Final</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .contenedor-principal {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%; height: 100%;
        }
        .afiche {
            max-width: 95%; max-height: 95%;
            object-fit: contain; z-index: 1;
        }
        /* Esta es la vibración que te funcionó perfecto */
        .vibrando {
            animation: bassHit 0.15s infinite alternate;
        }
        @keyframes bassHit {
            0% { transform: scale(1); filter: brightness(1); }
            100% { transform: scale(1.015); filter: brightness(1.1) blur(0.5px); }
        }
        .fuego-vivo {
            position: absolute;
            top: 25%; left: 10%;
            width: 35%; height: 45%;
            background: radial-gradient(circle, rgba(255, 68, 0, 0.4) 0%, transparent 70%);
            filter: blur(25px); pointer-events: none; z-index: 5;
            animation: pulsoFuego 3s infinite alternate;
        }
        @keyframes pulsoFuego { from { opacity: 0.3; } to { opacity: 0.8; } }
        #play-btn {
            position: absolute;
            bottom: 40px; padding: 15px 35px;
            background: rgba(255, 80, 0, 0.9); color: white;
            border: 2px solid white; cursor: pointer;
            font-weight: bold; border-radius: 50px; z-index: 100;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="contenedor-principal">
        <img src="afiche_completo.jpg" id="foto" class="afiche">
        <div class="fuego-vivo"></div>
        <button id="play-btn" onclick="toggleMusica()">ACTIVAR TECHNO</button>
    </div>
    <audio id="musica" loop><source src="musica.mp3" type="audio/mpeg"></audio>
    <script>
    function toggleMusica() {
        var audio = document.getElementById("musica");
        var btn = document.getElementById("play-btn");
        var img = document.getElementById("foto");
        if (audio.paused) {
            audio.play();
            btn.innerHTML = "PAUSAR";
            img.classList.add("vibrando");
        } else {
            audio.pause();
            btn.innerHTML = "ACTIVAR TECHNO";
            img.classList.remove("vibrando");
        }
    }
    </script>
</body>
</html>
